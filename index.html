<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Calculator</title>

  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.7);
      --accent1: #00c6ff;
      --accent2: #0072ff;
      --danger: #ff4d4d;
      --success: #00ff99;
      --warning: #ffcc00;
    }

    body.light {
      --bg1: #f5f7ff;
      --bg2: #dfe7ff;
      --card: rgba(255, 255, 255, 0.75);
      --border: rgba(0, 0, 0, 0.12);
      --text: #111827;
      --muted: rgba(0, 0, 0, 0.65);
      --accent1: #7c3aed;
      --accent2: #2563eb;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      color: var(--text);
      transition: 0.3s;
    }

    .container {
      width: 100%;
      max-width: 550px;
      padding: 22px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: 0px 12px 35px rgba(0, 0, 0, 0.35);
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0px); }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .themeBtn {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 13px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      transition: 0.2s;
    }

    .themeBtn:hover {
      transform: translateY(-2px);
    }

    .row {
      margin-top: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 13px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
      font-size: 15px;
      transition: 0.25s;
    }

    body.light input, body.light select {
      background: rgba(255, 255, 255, 0.95);
    }

    input:focus, select:focus {
      border: 1px solid rgba(0, 198, 255, 0.7);
      transform: scale(1.01);
    }

    select option {
      background: #111;
      color: white;
    }

    body.light select option {
      background: white;
      color: black;
    }

    button.calculateBtn {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      transition: 0.25s;
    }

    button.calculateBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0px 10px 18px rgba(0, 114, 255, 0.35);
    }

    .resultBox {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.20);
      border: 1px solid var(--border);
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.5;
    }

    body.light .resultBox {
      background: rgba(255, 255, 255, 0.65);
    }

    .warningBox {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-weight: 800;
      text-align: center;
    }

    .warningBox.success {
      color: var(--success);
    }

    .warningBox.danger {
      color: var(--danger);
    }

    .warningBox.warning {
      color: var(--warning);
    }

    .progressWrap {
      margin-top: 18px;
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
    }

    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--accent2) 0deg, rgba(255,255,255,0.15) 0deg);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .circle span {
      font-size: 18px;
      font-weight: 900;
    }

    .barArea {
      flex: 1;
    }

    .barLabel {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .progressBar {
      width: 100%;
      height: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progressFill {
      height: 100%;
      width: 0%;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      transition: 0.4s;
    }

    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="topbar">
      <h2>Attendance Calculator</h2>
      <button class="themeBtn" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="row">
      <label>Course Type</label>
      <select id="courseType" onchange="toggleFields()">
        <option value="L">Lab</option>
        <option value="T">Theory</option>
      </select>
    </div>

    <div class="row">
      <label>Credit Hours (Theory Only)</label>
      <input type="number" id="creditHours" value="3" min="1" disabled />
    </div>

    <div class="row">
      <label>Input Method</label>
      <select id="option" onchange="toggleFields()">
        <option value="1">Enter Total Absentees (Full Semester)</option>
        <option value="2">Enter Attendance % Till Week</option>
      </select>
    </div>

    <div class="row" id="weekRow">
      <label>Week Number (1-14)</label>
      <input type="number" id="weekNo" min="1" max="14" value="5" />
    </div>

    <div class="row" id="percentRow">
      <label>Attendance Percentage</label>
      <input type="number" id="percent" min="0" max="100" value="80" />
    </div>

    <div class="row" id="absentRow">
      <label>Total Absentees</label>
      <input type="number" id="absents" min="0" value="5" />
    </div>

    <button class="calculateBtn" onclick="calculate()">Calculate</button>

    <div class="progressWrap">
      <div class="circle" id="circle">
        <span id="circleText">0%</span>
      </div>

      <div class="barArea">
        <div class="barLabel">
          <span>Final % (if attend all)</span>
          <span id="barPercent">0%</span>
        </div>
        <div class="progressBar">
          <div class="progressFill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="warningBox" id="warningBox">
      Enter data and press Calculate.
    </div>

    <div class="resultBox" id="output">
      Waiting for input...
    </div>

    <div class="footer">
      Minimum required attendance: 75%
    </div>
  </div>

  <script>
    function toggleFields() {
      const courseType = document.getElementById("courseType").value;
      const option = document.getElementById("option").value;

      document.getElementById("creditHours").disabled = (courseType !== "T");

      if (option === "1") {
        document.getElementById("weekRow").style.display = "none";
        document.getElementById("percentRow").style.display = "none";
        document.getElementById("absentRow").style.display = "block";
      } else {
        document.getElementById("weekRow").style.display = "block";
        document.getElementById("percentRow").style.display = "block";
        document.getElementById("absentRow").style.display = "none";
      }
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    function updateProgress(percent) {
      if (percent < 0) percent = 0;
      if (percent > 100) percent = 100;

      document.getElementById("barPercent").innerText = percent.toFixed(2) + "%";
      document.getElementById("circleText").innerText = Math.round(percent) + "%";

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("circle").style.background =
        `conic-gradient(var(--accent2) ${percent * 3.6}deg, rgba(255,255,255,0.15) 0deg)`;
    }

    function setWarning(text, type) {
      const box = document.getElementById("warningBox");
      box.className = "warningBox " + type;
      box.innerText = text;
    }

    function calculate() {
      const TOTAL_WEEKS = 14;
      const MIN_PERCENT = 75;

      const courseType = document.getElementById("courseType").value;
      const option = document.getElementById("option").value;

      let classesPerWeek = 0;

      if (courseType === "L") {
        classesPerWeek = 3;
      } else {
        const creditHours = parseInt(document.getElementById("creditHours").value);

        if (isNaN(creditHours) || creditHours <= 0) {
          document.getElementById("output").innerText = "Invalid credit hours.";
          setWarning("ERROR: Invalid credit hours", "danger");
          updateProgress(0);
          return;
        }

        classesPerWeek = creditHours;
      }

      const totalClasses = TOTAL_WEEKS * classesPerWeek;
      const minPresentsRequired = Math.ceil((MIN_PERCENT / 100) * totalClasses);
      const totalAbsencesAllowed = totalClasses - minPresentsRequired;

      let outputText = "";

      if (option === "1") {
        const totalAbsents = parseInt(document.getElementById("absents").value);

        if (isNaN(totalAbsents) || totalAbsents < 0 || totalAbsents > totalClasses) {
          document.getElementById("output").innerText = "Invalid absentees value.";
          setWarning("ERROR: Invalid absentees value", "danger");
          updateProgress(0);
          return;
        }

        const totalPresents = totalClasses - totalAbsents;
        const finalPercent = (totalPresents * 100) / totalClasses;

        updateProgress(finalPercent);

        outputText += `TOTAL CLASSES: ${totalClasses}\n`;
        outputText += `TOTAL PRESENTS: ${totalPresents}\n`;
        outputText += `TOTAL ABSENTS: ${totalAbsents}\n\n`;

        outputText += `FINAL ATTENDANCE: ${finalPercent.toFixed(2)}%\n`;
        outputText += `MIN REQUIRED PRESENTS (75%): ${minPresentsRequired}\n\n`;

        outputText += `TOTAL ABSENTEES ALLOWED: ${totalAbsencesAllowed}\n`;

        if (finalPercent >= MIN_PERCENT) {
          setWarning("SAFE ✅ You are above 75%", "success");
        } else {
          setWarning("SHORT ❌ You are below 75%", "danger");
        }
      }
      else {
        const weekNo = parseInt(document.getElementById("weekNo").value);
        const currentPercent = parseFloat(document.getElementById("percent").value);

        if (isNaN(weekNo) || weekNo < 1 || weekNo > 14) {
          document.getElementById("output").innerText = "Invalid week number.";
          setWarning("ERROR: Week must be 1-14", "danger");
          updateProgress(0);
          return;
        }

        if (isNaN(currentPercent) || currentPercent < 0 || currentPercent > 100) {
          document.getElementById("output").innerText = "Invalid percentage.";
          setWarning("ERROR: Invalid percentage input", "danger");
          updateProgress(0);
          return;
        }

        const classesHeldSoFar = weekNo * classesPerWeek;
        const remainingClasses = totalClasses - classesHeldSoFar;

        const presentsSoFar = Math.round((currentPercent / 100) * classesHeldSoFar);
        const absentsSoFar = classesHeldSoFar - presentsSoFar;

        const finalPresentsIfAttendAll = presentsSoFar + remainingClasses;
        const finalPercentIfAttendAll = (finalPresentsIfAttendAll * 100) / totalClasses;

        updateProgress(finalPercentIfAttendAll);

        let remainingAbsencesAllowed = totalAbsencesAllowed - absentsSoFar;
        if (remainingAbsencesAllowed < 0) remainingAbsencesAllowed = 0;

        outputText += `WEEK: ${weekNo}\n`;
        outputText += `TOTAL CLASSES: ${totalClasses}\n`;
        outputText += `CLASSES HELD: ${classesHeldSoFar}\n`;
        outputText += `PRESENTS: ${presentsSoFar}\n`;
        outputText += `ABSENTS: ${absentsSoFar}\n`;
        outputText += `REMAINING CLASSES: ${remainingClasses}\n\n`;

        outputText += `IF YOU ATTEND ALL REMAINING:\n`;
        outputText += `FINAL ATTENDANCE: ${finalPercentIfAttendAll.toFixed(2)}%\n\n`;

        outputText += `TOTAL ABSENTEES ALLOWED: ${totalAbsencesAllowed}\n`;
        outputText += `ABSENTEES REMAINING: ${remainingAbsencesAllowed}\n\n`;

        if (finalPercentIfAttendAll >= MIN_PERCENT) {
          if (remainingAbsencesAllowed <= 2) {
            setWarning("RECOVERABLE ⚠️ But you're close to the limit", "warning");
          } else {
            setWarning("RECOVERABLE ✅ You can reach 75%", "success");
          }
        } else {
          setWarning("NOT RECOVERABLE ❌ Even perfect attendance won't reach 75%", "danger");
        }
      }

      document.getElementById("output").innerText = outputText;
    }

    toggleFields();
    updateProgress(0);
  </script>

</body>
</html>
